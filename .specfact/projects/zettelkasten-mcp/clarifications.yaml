    question: "Story STORY-ZETTELKASTENCONFIG-001 (As a user, I can view Zettelkasten
      Config data) has vague acceptance criteria (e.g., 'note creation works correctly
      (see contract examples)'). Should these be more specific? Note: Detailed test
      examples should be in OpenAPI contract files, not acceptance criteria."
    answer: 'Yes, be more specific. BDD-style acceptance for STORY-ZETTELKASTENMCPSERVER-001:
      (1) Given valid title and content, when zk_create_note is called, then a JSON
      response is returned with note_id, title, content, tags, created_at fields.
      (2) Given an empty title, when zk_create_note is called, then a structured JSON
      error object is returned: {"error": true, "code": "VALIDATION_ERROR", "message":
      "<description>"}. (3) Given valid parameters, when the MCP server initializes,
      then all services initialize without error and the server is ready to receive
      tool calls. Error handling: all tools return structured JSON error objects {"error":
      true, "code": "...", "message": "..."} for all failure cases.'
