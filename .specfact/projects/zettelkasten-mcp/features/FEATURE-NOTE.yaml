    (1) Given a valid search query, when zk_search_notes is called, then results are
    returned as a JSON list ordered by FTS5 BM25 relevance score descending; if no
    matches, an empty list is returned. (2) Given a valid source note_id, when zk_get_linked_notes
    is called, then all linked notes are returned with link_type and description;
    if note not found, a JSON error object {"error": true, "code": "NOT_FOUND", "message":
    "..."} is returned. (3) All MCP tool error states return structured JSON: {"error":
    true, "code": "NOT_FOUND|VALIDATION_ERROR|INTERNAL_ERROR", "message": "<human-readable
    description>"}.'
